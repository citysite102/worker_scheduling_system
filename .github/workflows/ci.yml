name: CI

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:
  # ============================================================
  # 純邏輯單元測試（不需要資料庫連線）
  # 此 job 在所有環境（包含 PR 合併到 main）都會執行
  # ============================================================
  unit-tests:
    name: 單元測試（無資料庫）
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安裝 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: TypeScript 型別檢查
        run: pnpm check

      - name: 執行純邏輯單元測試
        run: pnpm test:unit
        env:
          # 明確不提供 DATABASE_URL 與 TEST_DATABASE_URL
          # 確保此 job 不會連線到任何資料庫
          NODE_ENV: test
          VITEST: "true"

  # ============================================================
  # 資料庫整合測試（需要測試專用資料庫）
  # 此 job 只在 dev branch 執行，不在 main branch 執行
  # 需要在 GitHub Secrets 設定 TEST_DATABASE_URL
  # ============================================================
  integration-tests:
    name: 資料庫整合測試（僅 dev branch）
    runs-on: ubuntu-latest
    # 只在 dev branch 或 feature branch 執行，不在 main branch 執行
    if: github.ref != 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安裝 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 執行資料庫整合測試
        run: pnpm test:db
        env:
          NODE_ENV: test
          VITEST: "true"
          # TEST_DATABASE_URL 必須在 GitHub Secrets 中設定
          # 指向測試專用資料庫，與正式環境完全隔離
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        # 若未設定 TEST_DATABASE_URL，跳過此步驟（不報錯）
        continue-on-error: ${{ secrets.TEST_DATABASE_URL == '' }}
